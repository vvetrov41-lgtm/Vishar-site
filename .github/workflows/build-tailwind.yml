name: Build Tailwind CSS

on:
  workflow_dispatch:

jobs:
  build-tailwind:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Tailwind CSS
        run: npm run build:tailwind

      - name: Verify compiled CSS output
        run: |
          test -f assets/css/tailwind.css
          size=$(wc -c < assets/css/tailwind.css)
          echo "tailwind.css size: ${size} bytes"
          if [ "$size" -lt 5000 ]; then
            echo "Compiled CSS appears too small; failing."
            exit 1
          fi

      - name: Upload compiled CSS artifact
        uses: actions/upload-artifact@v4
        with:
          name: tailwind-css
          path: assets/css/tailwind.css

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/css/tailwind.css package-lock.json || true
          if git diff --cached --quiet; then
            echo "No generated changes to commit"
            exit 0
          fi
          git commit -m "chore: build tailwind css artifact"

      - name: Rebase and push to main
        run: |
          if git log -1 --pretty=%B | grep -q "chore: build tailwind css artifact"; then
            git pull --rebase origin main
            git push origin HEAD:main
          else
            echo "No commit created; skipping push"
          fi
