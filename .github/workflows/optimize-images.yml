name: Optimize Images

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  optimize-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run optimization
        run: npm run optimize:images

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: image-optimization-reports
          path: |
            IMAGE_OPTIMIZATION_REPORT.md
            IMAGE_OPTIMIZATION_REPORT.json

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add IMAGE_OPTIMIZATION_REPORT.md IMAGE_OPTIMIZATION_REPORT.json
          find assets -type f \( -name "*.webp" -o -name "*.avif" \) -print0 | xargs -0 -r git add
          if git diff --cached --quiet; then
            echo "No generated image/report changes to commit."
            exit 0
          fi
          git commit -m "chore: optimize top images and update reports"
          git push
