name: Optimize Images

on:
  workflow_dispatch:
    inputs:
      image_root:
        description: Folder to scan for source images
        required: true
        default: assets
      image_limit:
        description: Number of largest images to optimize
        required: true
        default: '15'
      generate_webp:
        description: Generate WebP derivatives
        required: true
        default: 'true'
      generate_avif:
        description: Generate AVIF derivatives
        required: true
        default: 'true'
      force:
        description: Regenerate derivatives even if they are newer than originals
        required: true
        default: 'false'

permissions:
  contents: write

jobs:
  optimize-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run optimization
        env:
          IMAGE_ROOT: ${{ github.event.inputs.image_root || 'assets' }}
          IMAGE_LIMIT: ${{ github.event.inputs.image_limit || '15' }}
          GENERATE_WEBP: ${{ github.event.inputs.generate_webp || 'true' }}
          GENERATE_AVIF: ${{ github.event.inputs.generate_avif || 'true' }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: npm run optimize:images

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: image-optimization-reports
          path: |
            IMAGE_OPTIMIZATION_REPORT.md
            IMAGE_OPTIMIZATION_REPORT.json

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add IMAGE_OPTIMIZATION_REPORT.md IMAGE_OPTIMIZATION_REPORT.json
          find assets -type f \( -name "*.webp" -o -name "*.avif" \) -print0 | xargs -0 -r git add
          if git diff --cached --quiet; then
            echo "No generated image/report changes to commit."
            exit 0
          fi
          git commit -m "chore: optimize top images and update reports"
          if ! git pull --rebase origin main; then
            echo "Rebase failed while updating from origin/main before push. Resolve conflicts and re-run workflow."
            exit 1
          fi
          git push origin HEAD:main
